# NOTE: Pages "Source" is set to "Deploy from a branch" (main / root), which runs
# an automatic legacy build on every push. That legacy build is the live deployer
# and serves the pre-built static export committed to the branch root (.nojekyll
# disables Jekyll so _next/ assets load). Running this Actions workflow on push too
# makes both deployments race for the Pages environment ("Deployment failed, try
# again later"). So this workflow is manual-only. To use it as the real deployer,
# an admin must set Settings → Pages → Source → "GitHub Actions", then re-add the
# push trigger below.
name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static site (next export → ./out)
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
