# Pages "Source" is "Deploy from a branch" (main / root). The legacy builder serves
# the pre-built static export committed to the branch root; .nojekyll at the root
# disables Jekyll so the _next/ asset folder (and index.html) are served as-is and
# README.md is never rendered as the homepage. This Actions workflow is manual-only
# so it does not race the legacy builder for the Pages environment. To switch to a
# clean Actions-based deploy, set Settings → Pages → Source → "GitHub Actions" and
# re-add the push trigger here.
name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static site (next export → ./out)
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
